<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f0f0f0"/>
  
  <!-- House Icon -->
  <g transform="translate(200, 150)">
    <!-- Roof -->
    <polygon points="0,-60 -80,0 80,0" fill="#2c3e50"/>
    
    <!-- House Body -->
    <rect x="-60" y="0" width="120" height="80" fill="#3498db"/>
    
    <!-- Door -->
    <rect x="-15" y="40" width="30" height="40" fill="#34495e"/>
    
    <!-- Windows -->
    <rect x="-45" y="15" width="20" height="20" fill="#ecf0f1"/>
    <rect x="25" y="15" width="20" height="20" fill="#ecf0f1"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">
    Property Image
  </text>
</svg>
